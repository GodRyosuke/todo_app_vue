version: '3'

services:
  db:
    image: postgres:17
    volumes:
      - ../db:/var/lib/postgresql/data
    restart: always
    ports: 
     - 5432:5432
    environment:
      - TZ=Asia/Tokyo
      - PGTZ=Asia/Tokyo
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=tododb
      - POSTGRES_DB=todo_db

  frontend:
    depends_on:
      - db
      - backend
    image: node:25.4.0-bullseye-slim
    ports:
      - "8000:5173"
    working_dir: /app
    command: yarn dev
    volumes:
     - ../frontend/package.json:/app/package.json
     - ../frontend/yarn.lock:/app/yarn.lock
     - ../frontend/node_modules_docker:/app/node_modules
     - ../frontend/src:/app/src
     - ../frontend/index.html:/app/index.html
     - ../frontend/tsconfig.json:/app/tsconfig.json
     - ../frontend/tsconfig.app.json:/app/tsconfig.app.json
     - ../frontend/tsconfig.node.json:/app/tsconfig.node.json
     - ../frontend/vite.config.ts:/app/vite.config.ts
     - ../frontend/public:/app/public
    environment:
     - HOST=0.0.0.0

  backend:
    image: node:25.4.0-bullseye-slim
    depends_on:
      - db
    working_dir: /app
    volumes:
      - ../backend/package.json:/app/package.json
      - ../backend/yarn.lock:/app/yarn.lock
      - ../backend/tsconfig.json:/app/tsconfig.json
      - ../backend/node_modules_docker:/app/node_modules
      - ../backend/src:/app/src
      - ../backend/generated:/app/generated
      - ../backend/dist:/app/dist
      - ../backend/.env:/app/.env
      - ../backend/prisma.config.ts:/app/prisma.config.ts
      - ../backend/prisma/:/app/prisma/
    ports:
      - "3000:3000"
      # - "51212:51212"
    command: yarn start
