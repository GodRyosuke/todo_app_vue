version: '3'

services:
  db:
    image: postgres:17
    volumes:
      - ../db:/var/lib/postgresql/data
    restart: always
    ports: 
     - 5432:5432
    environment:
      - TZ=Asia/Tokyo
      - PGTZ=Asia/Tokyo
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=tododb
      - POSTGRES_DB=todo_db

  frontend:
    depends_on:
      - backend
    build:
      context: ..
      dockerfile: .dockerfiles/frontend.Dockerfile
    ports:
      - "8000:80"

  backend:
    build:
      context: ..
      dockerfile: .dockerfiles/backend.Dockerfile
    depends_on:
      - db
    working_dir: /app
    environment:
      - DATABASE_URL=${DATABASE_URL}
    ports:
      - "3000:3000"
