version: '3'

services:
  db:
    image: mysql:5.7
    volumes:
      - ../db:/var/lib/mysql
    restart: always
    ports: 
     - 3306:3306
    environment:
      - "MYSQL_ROOT_PASSWORD=password"
      - "MYSQL_DATABASE=wordpress"
      - "MYSQL_USER=wordpress"
      - "MYSQL_PASSWORD=wordpress"

  app:
    depends_on:
      - db
    build:
      context: ..
      dockerfile: .dockerfiles/Dockerfile.app
    ports:
      - "8000:80"

  backend:
    image: node:25.4.0-bullseye-slim
    working_dir: /usr/src/app
    volumes:
      - ../backend:/usr/src/app
    command: sh -c "npm install && npm start"
    ports:
      - "3000:3000"

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    environment:
      - PMA_ARBITRARY=1
      - PMA_HOST=db #mysqlサービス名を指定
      - PMA_USER=wordpress
      - PMA_PASSWORD=wordpress
    links:
      - db
    ports:
      - 4040:80
    volumes:
      - ../phpmyadmin/sessions:/sessions
volumes:
    db_data: