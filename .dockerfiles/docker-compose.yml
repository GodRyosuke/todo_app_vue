version: '3'

services:
  db:
    image: postgres:17
    volumes:
      - ../db:/var/lib/postgresql/data
    restart: always
    ports: 
     - 5432:5432
    environment:
      - TZ=Asia/Tokyo
      - PGTZ=Asia/Tokyo
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=tododb
      - POSTGRES_DB=todo_db

  frontend:
    depends_on:
      - backend
    build:
      context: ..
      dockerfile: .dockerfiles/frontend.Dockerfile
    ports:
      - "8000:80"

  backend:
    build:
      context: ..
      dockerfile: .dockerfiles/backend.Dockerfile
    depends_on:
      - db
    working_dir: /app
    environment:
      - DATABASE_URL=postgresql://todouser:tododb@db:5432/todo_db?schema=public
      - TOKEN_SECRET=todo_secret
      - SERVICE_DOMAIN=http://localhost:8000
      - MAIL_FROM=noreply@todoapp.com
      - MAIL_SERVER_HOST_NAME=mailhog
      - MAIL_SERVER_PORT=1025
      - MAIL_USE_SECURE=false
      - MAIL_USER=${MAIL_USER}
      - MAIL_PASS=${MAIL_PASS}
    ports:
      - "3000:3000"

  mailhog:
    image: mailhog/mailhog
    ports:
      - "1025:1025"
      - "8025:8025"
