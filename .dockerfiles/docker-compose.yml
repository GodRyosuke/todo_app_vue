version: '3'

services:
  db:
    image: postgres:17
    volumes:
      - ../db:/var/lib/postgresql/data
    restart: always
    ports: 
     - 5432:5432
    environment:
      - TZ=Asia/Tokyo
      - PGTZ=Asia/Tokyo
      - POSTGRES_USER=todouser
      - POSTGRES_PASSWORD=tododb
      - POSTGRES_DB=todo_db

  frontend:
    depends_on:
      - backend
    image: nginx:stable-alpine3.23-perl
    ports:
      - "8000:80"
    volumes:
     - ../frontend/dist:/usr/share/nginx/html
     - ../frontend/nginx/default.conf:/etc/nginx/conf.d/default.conf

  backend:
    image: node:25.4.0-bullseye-slim
    depends_on:
      - db
    working_dir: /app
    volumes:
      - ../backend/package.json:/app/package.json
      - ../backend/yarn.lock:/app/yarn.lock
      - ../backend/tsconfig.json:/app/tsconfig.json
      - ../backend/node_modules_docker:/app/node_modules
      - ../backend/src:/app/src
      - ../backend/generated:/app/generated
      - ../backend/dist:/app/dist
      - ../backend/.env:/app/.env
      - ../backend/prisma.config.ts:/app/prisma.config.ts
      - ../backend/prisma/:/app/prisma/
    ports:
      - "3000:3000"
    command: yarn start
